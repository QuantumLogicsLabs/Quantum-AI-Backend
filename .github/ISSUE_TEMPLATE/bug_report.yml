name: Bug report
description: Report a QuantumAI backend defect
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security
      options:
        - label: This is not a security vulnerability (I would use private advisory reporting if it were)
          required: true
